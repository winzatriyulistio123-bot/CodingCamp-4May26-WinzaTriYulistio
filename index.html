<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="dashboard" role="main">

      <!-- ===== Greeting Widget ===== -->
      <section class="widget widget--greeting" aria-label="Greeting">
        <p id="greeting-time" class="greeting__time" aria-live="polite">--:--</p>
        <p id="greeting-date" class="greeting__date"></p>
        <p id="greeting-message" class="greeting__message">Welcome</p>
      </section>

      <!-- ===== Focus Timer Widget ===== -->
      <section class="widget widget--timer" aria-label="Focus Timer">
        <h2 class="widget__title">Focus Timer</h2>
        <div class="timer__display-wrapper">
          <p id="timer-display" class="timer__display" aria-live="polite" aria-atomic="true">25:00</p>
          <p id="timer-complete" class="timer__complete" aria-live="assertive" hidden>Session complete!</p>
        </div>
        <div class="timer__controls">
          <button id="timer-start" type="button" class="btn btn--primary">Start</button>
          <button id="timer-stop" type="button" class="btn btn--secondary">Stop</button>
          <button id="timer-reset" type="button" class="btn btn--secondary">Reset</button>
        </div>
      </section>

      <!-- ===== Todo List Widget ===== -->
      <section class="widget widget--todo" aria-label="Todo List">
        <h2 class="widget__title">Todo List</h2>
        <div class="todo__add-form">
          <label for="todo-input" class="sr-only">New task description</label>
          <input
            id="todo-input"
            type="text"
            class="todo__input"
            placeholder="Add a new task…"
            maxlength="200"
            aria-label="New task description"
          />
          <button id="todo-add-btn" type="button" class="btn btn--primary">Add</button>
        </div>
        <p id="todo-char-limit-msg" class="todo__error" aria-live="polite" hidden>
          Task description cannot exceed 200 characters.
        </p>
        <ul id="todo-list" class="todo__list" aria-label="Task list" aria-live="polite"></ul>
      </section>

      <!-- ===== Quick Links Widget ===== -->
      <section class="widget widget--links" aria-label="Quick Links">
        <h2 class="widget__title">Quick Links</h2>
        <div class="links__add-form">
          <div class="links__field-group">
            <label for="link-label-input" class="links__label">Label</label>
            <input
              id="link-label-input"
              type="text"
              class="links__input"
              placeholder="e.g. GitHub"
              aria-label="Link label"
            />
            <p id="link-label-error" class="links__error" aria-live="polite" hidden>Label is required.</p>
          </div>
          <div class="links__field-group">
            <label for="link-url-input" class="links__label">URL</label>
            <input
              id="link-url-input"
              type="url"
              class="links__input"
              placeholder="https://example.com"
              aria-label="Link URL"
            />
            <p id="link-url-error" class="links__error" aria-live="polite" hidden>URL is required.</p>
          </div>
          <button id="link-add-btn" type="button" class="btn btn--primary">Add Link</button>
        </div>
        <div id="links-panel" class="links__panel" aria-label="Saved links" aria-live="polite">
          <p id="links-placeholder" class="links__placeholder">No links saved yet.</p>
        </div>
      </section>

    </main>

    <script src="js/app.js"></script>
  </body>
</html>
